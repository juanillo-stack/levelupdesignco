kind = "mobile"
previewPath = "/mobile"
title = "LevelUp Design Co. Mobile"
version = "1.0.0"
id = "levelup-design-mobile-artifact"
router = "path"

[[integratedSkills]]
name = "expo"
version = "1.0.0"

[[services]]
name = "expo"
paths = [ "/mobile" ]
localPort = 3001

[services.development]
run = "pnpm --filter @workspace/levelup-design-mobile run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/levelup-design-mobile", "run", "build" ]
run = "pnpm --filter @workspace/levelup-design-mobile run serve"

[services.env]
PORT = "3001"
